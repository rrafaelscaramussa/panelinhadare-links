<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Montserrat,sans-serif;background:linear-gradient(135deg,#f8f9fa 0%,#fff 100%);min-height:100vh;padding:20px}
.container{max-width:680px;margin:0 auto;padding:40px 20px}
.header{text-align:center;margin-bottom:50px;animation:fadeIn .8s}
.name{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:600;color:#1a2332;margin-bottom:10px}
.ornament{width:80px;height:20px;margin:20px auto;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><path d="M50 10 L30 5 L35 10 L30 15 L50 10 L70 5 L65 10 L70 15 Z" fill="%23c9a961"/></svg>') center no-repeat;background-size:contain;opacity:.7}
.links-section{margin-bottom:40px}
.link-card{background:#fff;border-radius:16px;margin-bottom:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.08);transition:all .3s;animation:fadeUp .6s backwards}
.link-card:nth-child(1){animation-delay:.1s}
.link-card:nth-child(2){animation-delay:.2s}
.link-card:nth-child(3){animation-delay:.3s}
.link-card:hover{transform:translateY(-5px);box-shadow:0 8px 30px rgba(201,169,97,.25)}
.link-card a{display:block;text-decoration:none;position:relative}
.link-card img{width:100%;height:auto;display:block;transition:transform .3s}
.link-card:hover img{transform:scale(1.02)}
.footer{text-align:center;margin-top:60px;padding-top:30px;border-top:1px solid rgba(201,169,97,.2);color:#999;font-size:13px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.container{padding:20px 10px}.name{font-size:36px}}
</style>
</head>
